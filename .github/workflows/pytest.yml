permissions:
  contents: read
on:
  push:
    branches: [main]
  pull_request:
concurrency:
    group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
    cancel-in-progress: true
name: pytest
jobs:
  test:
    name: run py tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: set up
        uses: actions/setup-python@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: dependencies
        run: |
          uv venv
          uv pip install pytest pytest-cov maturin # TODO requirements.txt
          uv run maturin develop --release

      - name: run
        run: uv run pytest --cov --cov-branch --cov-report=xml

      - name: Uploa to codecov.io
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # tag=v5.5.2
        with:
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
          env_vars: OS,PYTHON
